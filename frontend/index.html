<!DOCTYPE html>
<html lang="pt-br">
<head>
  <meta charset="UTF-8">
  <title>MIR + MNE</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>MIR + MNE</h1>

  <!-- Usando grid para organizar os campos -->
  <div class="grid">
    
    <!-- NOME -->
    <div class="field">
      <label>📛 Nome</label>
      <input type="text" id="nome" placeholder="Digite o nome">
    </div>

    <!-- SOBRENOME -->
    <div class="field">
      <label>👨‍👩‍👧 Sobrenome</label>
      <input type="text" id="sobrenome" placeholder="Digite o sobrenome">
    </div>

    <!-- EMAIL (NOVO) -->
    <div class="field">
      <label>📧 Email</label>
      <input type="email" id="email" placeholder="exemplo@dominio.com">
    </div>

    <!-- CELULAR (NOVO) -->
    <div class="field">
      <label>📱 Celular</label>
      <input type="tel" id="celular" placeholder="(11) 98765-4321">
    </div>

    <!-- CEP -->
    <div class="field">
      <label>📮 CEP</label>
      <input type="text" id="cep" placeholder="CEP" onblur="buscarCEP()">
    </div>

    <!-- RUA (preenchido automaticamente pelo ViaCEP) -->
    <div class="field">
      <label>🏠 Rua</label>
      <input type="text" id="rua" placeholder="Rua" readonly>
    </div>

    <!-- CIDADE (preenchido automaticamente pelo ViaCEP) -->
    <div class="field">
      <label>🌆 Cidade</label>
      <input type="text" id="cidade" placeholder="Cidade" readonly>
    </div>

    <!-- NÚMERO DA CASA -->
    <div class="field">
      <label>🔢 Número</label>
      <input type="text" id="casa" placeholder="Número da Casa">
    </div>

    <!-- CPF -->
    <div class="field">
      <label>📄 CPF</label>
      <div class="cpf-container">
        <input type="text" id="cpf" placeholder="CPF">
        <button type="button" onclick="gerarCPF()">Gerar CPF</button>
      </div>
    </div>

  </div>

  <!-- BOTÕES DE AÇÃO -->
  <div class="actions">
    <button onclick="cadastrar()" class="primary">📝 Cadastrar</button>
    <button onclick="estatisticas()">📊 Estatísticas</button>
    <button onclick="listar()">📋 Listar Registros</button>
    <button onclick="abrirModalLimpeza()" style="background: #d32f2f; color: white;">🗑️ Limpar Banco</button>
    <button onclick="abrirModalSeed()" style="background: #2196f3; color: white;">🌱 Popular Banco</button>
  </div>

  <!-- Adicionar após os botões principais -->
<div class="search-section">
  <h2>🔍 Busca Avançada</h2>
  <div class="search-container">
    <input type="text" id="searchTerm" placeholder="Digite nome, email ou CPF..." class="search-input">
    <select id="searchType" class="search-select">
      <option value="todos">Todos os campos</option>
      <option value="nome">Nome</option>
      <option value="email">Email</option>
      <option value="cpf">CPF</option>
      <option value="cep">CEP</option>
    </select>
    <button onclick="buscarAvancado()" class="search-btn">🔍 Buscar</button>
    <button onclick="limparBusca()" class="clear-btn">🗑️ Limpar</button>
  </div>
  <div id="buscaInfo" style="display: none;"></div>
</div>

  <!-- MODAL DE LIMPEZA (mantido igual) -->
  <div id="modalLimpeza" class="modal" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3>⚠️ LIMPEZA TOTAL DO BANCO DE DADOS</h3>
        <span class="modal-close" onclick="fecharModalLimpeza()">&times;</span>
      </div>
      <div class="modal-body">
        <p style="color: #ff6b6b;"><strong>ATENÇÃO:</strong> Esta ação irá remover TODOS os registros!</p>
        <div class="form-group">
          <label>🔑 Senha de Administrador:</label>
          <input type="password" id="senhaLimpeza" placeholder="Digite a senha" class="senha-input">
        </div>
        <div id="statusLimpeza"></div>
      </div>
      <div class="modal-footer">
        <button onclick="confirmarLimpeza()" class="btn-danger">🗑️ Confirmar</button>
        <button onclick="fecharModalLimpeza()" class="btn-secondary">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- MODAL DE SEED (mantido igual) -->
  <div id="modalSeed" class="modal" style="display: none;">
    <div class="modal-content">
      <div class="modal-header">
        <h3>🌱 POPULAR BANCO DE DADOS</h3>
        <span class="modal-close" onclick="fecharModalSeed()">&times;</span>
      </div>
      <div class="modal-body">
        <div class="form-group">
          <label>📊 Quantidade de registros:</label>
          <select id="quantidadeRegistros" class="senha-input">
            <option value="10">10 registros</option>
            <option value="50">50 registros</option>
            <option value="100" selected>100 registros</option>
            <option value="500">500 registros</option>
            <option value="1000">1.000 registros</option>
          </select>
        </div>
        <div class="form-group">
          <label>🔑 Senha de Administrador:</label>
          <input type="password" id="senhaSeed" placeholder="Digite a senha" class="senha-input">
        </div>
        <div id="statusSeed"></div>
      </div>
      <div class="modal-footer">
        <button onclick="confirmarSeed()" class="btn-primary">🌱 Iniciar</button>
        <button onclick="fecharModalSeed()" class="btn-secondary">Cancelar</button>
      </div>
    </div>
  </div>

  <hr>

  <!-- GRÁFICOS -->
  <div class="dashboard">
    <div class="chart-box"><canvas id="graficoBytes"></canvas></div>
    <div class="chart-box"><canvas id="graficoEconomia"></canvas></div>
  </div>

  <!-- RESULTADO -->
  <div id="resultado"></div>

  <!-- ESTATÍSTICAS -->
  <pre id="stats"></pre>

  <!-- LISTAGEM -->
  <h2>📋 Listagem MIR</h2>
  <div id="tempo"></div>
  <div id="paginacao-controles"></div>
  <div id="lista"></div>

  <script src="script.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.5.1/dist/chart.umd.min.js"
    integrity="sha384-jb8JQMbMoBUzgWatfe6COACi2ljcDdZQ2OxczGA3bGNeWe+6DChMTBJemed7ZnvJ"
    crossorigin="anonymous"></script>
</body>
</html>
